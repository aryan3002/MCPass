# fly.toml app configuration generated for mcpaas-mcp-server
app = "mcpaas-mcp"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.http_server]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    number = 443
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    number = 80
    handlers = ["http"]


[deploy]
  strategy = "rolling"
  max_unavailable = 0
